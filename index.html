<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gesture Arena｜AI 猜拳競技場</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #080b12;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: #f5f7ff;
      touch-action: none;
      user-select: none;
    }

    #input-video {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 155, 35, 0.28), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(0, 209, 255, 0.22), transparent 36%),
        linear-gradient(180deg, #101624 0%, #080b12 54%, #15100a 100%);
    }

    #game-container::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 72%);
    }

    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #05070d;
      z-index: 1;
    }

    #camera-mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        linear-gradient(180deg, rgba(8,11,18,0.82) 0%, transparent 28%, transparent 66%, rgba(8,11,18,0.82) 100%),
        radial-gradient(circle at center, transparent 42%, rgba(0,0,0,0.32) 100%);
    }

    #top-bar {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 14px);
      left: 16px;
      right: 16px;
      height: 72px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      border: 1px solid rgba(255, 199, 90, 0.28);
      border-radius: 24px;
      background: rgba(12, 16, 26, 0.7);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(0,0,0,0.28);
    }

    #brand {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    #brand small {
      color: #ffbd59;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    #top-title {
      margin-top: 4px;
      font-size: 19px;
      font-weight: 950;
      letter-spacing: 0.5px;
    }

    #corner-score {
      padding: 10px 14px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,189,89,0.25), rgba(255,189,89,0.08));
      color: #ffcf7a;
      font-size: 18px;
      font-weight: 950;
      border: 1px solid rgba(255, 199, 90, 0.3);
      white-space: nowrap;
    }

    #gesture-label {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 104px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 32;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0, 209, 255, 0.35);
      background: rgba(4, 12, 20, 0.7);
      color: #8eeeff;
      font-size: clamp(15px, 4.2vw, 22px);
      font-weight: 900;
      text-shadow: 0 0 16px rgba(0, 209, 255, 0.38);
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      backdrop-filter: blur(10px);
    }

    #gesture-label.show {
      opacity: 1;
    }

    #main-ui {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      padding: 128px 18px 146px;
      text-align: center;
    }

    #status-card {
      width: min(92vw, 470px);
      padding: 24px 18px;
      border-radius: 30px;
      background: rgba(8, 11, 18, 0.34);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }

    #status-display {
      font-size: clamp(34px, 10vw, 76px);
      font-weight: 950;
      line-height: 1.12;
      letter-spacing: 1px;
      white-space: pre-line;
      text-shadow:
        0 4px 18px rgba(0, 0, 0, 0.85),
        0 0 24px rgba(255, 189, 89, 0.26);
    }

    #sub-status {
      margin-top: 14px;
      min-height: 30px;
      font-size: clamp(14px, 3.8vw, 20px);
      font-weight: 850;
      color: rgba(245, 247, 255, 0.78);
      line-height: 1.55;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.9);
    }

    #bottom-hint {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      z-index: 35;
      min-height: 78px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.55;
      font-size: clamp(13px, 3.7vw, 17px);
      font-weight: 850;
      color: rgba(255, 255, 255, 0.72);
      background: rgba(12, 16, 26, 0.74);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.28);
    }

    #round-flash {
      position: absolute;
      inset: 0;
      z-index: 28;
      background: rgba(255, 189, 89, 0);
      pointer-events: none;
      transition: background 0.16s ease;
    }

    #round-flash.active {
      background: rgba(255, 189, 89, 0.24);
    }

    #result-modal {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(8px);
    }

    #result-card {
      width: min(92vw, 520px);
      padding: 28px 22px 24px;
      border-radius: 32px;
      background:
        linear-gradient(180deg, rgba(26, 31, 44, 0.92), rgba(13, 16, 24, 0.9));
      border: 1px solid rgba(255, 189, 89, 0.24);
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.58),
        inset 0 1px 0 rgba(255,255,255,0.08);
      text-align: center;
    }

    #result-title {
      margin: 0 0 10px;
      font-size: clamp(30px, 8vw, 54px);
      font-weight: 950;
      letter-spacing: 1px;
      color: #ffcf7a;
      text-shadow: 0 0 24px rgba(255, 189, 89, 0.25);
    }

    #result-score {
      width: 100%;
      margin: 0 auto 20px;
      padding: 13px 14px;
      border-radius: 18px;
      font-size: clamp(17px, 4.6vw, 24px);
      font-weight: 950;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #result-hint {
      margin-bottom: 18px;
      font-size: clamp(14px, 4vw, 19px);
      color: rgba(255, 255, 255, 0.72);
      font-weight: 850;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .game-btn {
      height: 72px;
      border: none;
      border-radius: 22px;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28);
    }

    #end-btn {
      color: #fff;
      background: linear-gradient(180deg, #ff5a3d, #ba2317);
    }

    #continue-btn {
      color: #061017;
      background: linear-gradient(180deg, #8eeeff, #40c7e8);
    }

    #camera-error {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, #1b2638, #080b12 72%);
      text-align: center;
    }

    #camera-error-card {
      max-width: 520px;
      width: 100%;
      padding: 30px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    #camera-error-card h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    #camera-error-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.7;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      #game-container {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <video id="input-video" playsinline muted autoplay></video>

  <main id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="camera-mask"></div>
    <div id="round-flash"></div>

    <header id="top-bar">
      <div id="brand">
        <small>GESTURE ARENA</small>
        <div id="top-title">AI 猜拳競技場</div>
      </div>
      <div id="corner-score">勝場 0</div>
    </header>

    <div id="gesture-label">掃描：☝️ 開始</div>

    <section id="main-ui">
      <div id="status-card">
        <div id="status-display">系統啟動中</div>
        <div id="sub-status">請允許攝影機權限</div>
      </div>
    </section>

    <div id="bottom-hint">
      指令：☝️ 開局　👌 下一局　🖖 結束　🤘 重置競技場
    </div>

    <section id="result-modal">
      <div id="result-card">
        <h1 id="result-title">回合結算</h1>
        <div id="result-score">勝 0　敗 0　平 0</div>
        <div id="result-hint">👌 下一局　🖖 結束</div>

        <div class="button-row">
          <button id="end-btn" class="game-btn">🖖 結束</button>
          <button id="continue-btn" class="game-btn">👌 下一局</button>
        </div>
      </div>
    </section>

    <section id="camera-error">
      <div id="camera-error-card">
        <h1>攝影機啟動失敗</h1>
        <p>
          請確認瀏覽器已允許攝影機權限。<br />
          若使用 GitHub Pages，網址必須是 HTTPS。<br />
          請重新整理頁面再試一次。
        </p>
      </div>
    </section>
  </main>

  <script>
    const videoElement = document.getElementById("input-video");
    const canvasElement = document.getElementById("game-canvas");
    const canvasCtx = canvasElement.getContext("2d");

    const statusDisplay = document.getElementById("status-display");
    const subStatus = document.getElementById("sub-status");
    const bottomHint = document.getElementById("bottom-hint");
    const cornerScore = document.getElementById("corner-score");
    const gestureLabel = document.getElementById("gesture-label");

    const resultModal = document.getElementById("result-modal");
    const resultTitle = document.getElementById("result-title");
    const resultScore = document.getElementById("result-score");
    const resultHint = document.getElementById("result-hint");

    const endBtn = document.getElementById("end-btn");
    const continueBtn = document.getElementById("continue-btn");
    const roundFlash = document.getElementById("round-flash");
    const cameraError = document.getElementById("camera-error");

    const HAND_CONNECTIONS_LOCAL = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17]
    ];

    const GESTURE = {
      ROCK: "ROCK",
      PAPER: "PAPER",
      SCISSORS: "SCISSORS",
      START: "START",
      CONTINUE: "CONTINUE",
      END: "END",
      RESTART: "RESTART",
      UNKNOWN: "UNKNOWN"
    };

    const gestureText = {
      ROCK: "✊ 石頭",
      PAPER: "🖐️ 布",
      SCISSORS: "✌️ 剪刀",
      START: "☝️ 開局",
      CONTINUE: "👌 下一局",
      END: "🖖 結束",
      RESTART: "🤘 重置",
      UNKNOWN: ""
    };

    let gameState = "LOADING";
    let wins = 0;
    let losses = 0;
    let draws = 0;

    let latestGesture = GESTURE.UNKNOWN;
    let stableGesture = GESTURE.UNKNOWN;
    let stableCount = 0;
    let startHoldFrames = 0;
    let menuHoldFrames = 0;
    let restartHoldFrames = 0;

    let countdownRunning = false;
    let gestureSamples = [];
    let thinkingTimer = null;
    let processingFrame = false;
    let hands = null;
    let streamReady = false;

    let drawRect = {
      x: 0,
      y: 0,
      width: 0,
      height: 0
    };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = canvasElement.clientWidth;
      const height = canvasElement.clientHeight;

      canvasElement.width = Math.floor(width * dpr);
      canvasElement.height = Math.floor(height * dpr);

      canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function fingerIsExtended(landmarks, tip, pip, mcp) {
      const tipToWrist = distance(landmarks[tip], landmarks[0]);
      const pipToWrist = distance(landmarks[pip], landmarks[0]);
      const mcpToWrist = distance(landmarks[mcp], landmarks[0]);

      const verticalExtended = landmarks[tip].y < landmarks[pip].y;

      const distanceExtended =
        tipToWrist > pipToWrist &&
        pipToWrist > mcpToWrist * 0.82;

      return verticalExtended || distanceExtended;
    }

    function isOkGesture(landmarks) {
      const thumbIndexClose = distance(landmarks[4], landmarks[8]) < 0.075;

      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      return thumbIndexClose && middleUp && ringUp && pinkyUp;
    }

    function isVulcanGesture(landmarks) {
      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (!(indexUp && middleUp && ringUp && pinkyUp)) return false;

      const indexMiddleGap = distance(landmarks[8], landmarks[12]);
      const middleRingGap = distance(landmarks[12], landmarks[16]);
      const ringPinkyGap = distance(landmarks[16], landmarks[20]);

      return (
        middleRingGap > indexMiddleGap * 1.1 &&
        middleRingGap > ringPinkyGap * 1.1 &&
        middleRingGap > 0.05
      );
    }

    function isRockOnGesture(landmarks) {
      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      return indexUp && !middleUp && !ringUp && pinkyUp;
    }

    function detectGesture(landmarks) {
      if (!landmarks || landmarks.length < 21) return GESTURE.UNKNOWN;

      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (isOkGesture(landmarks)) return GESTURE.CONTINUE;
      if (isVulcanGesture(landmarks)) return GESTURE.END;
      if (isRockOnGesture(landmarks)) return GESTURE.RESTART;

      if (indexUp && !middleUp && !ringUp && !pinkyUp) {
        return GESTURE.START;
      }

      const extendedCount = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

      if (extendedCount >= 4) return GESTURE.PAPER;
      if (indexUp && middleUp && !ringUp && !pinkyUp) return GESTURE.SCISSORS;
      if (extendedCount === 0) return GESTURE.ROCK;

      return GESTURE.UNKNOWN;
    }

    function updateStableGesture(gesture) {
      if (gesture === latestGesture) {
        stableCount += 1;
      } else {
        latestGesture = gesture;
        stableCount = 1;
      }

      if (stableCount >= 3) {
        stableGesture = gesture;
      }
    }

    function getComputerChoice() {
      const choices = [GESTURE.ROCK, GESTURE.PAPER, GESTURE.SCISSORS];
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function updateScore() {
      cornerScore.textContent = `勝場 ${wins}`;
      resultScore.textContent = `勝 ${wins}　敗 ${losses}　平 ${draws}`;
    }

    function flash() {
      roundFlash.classList.add("active");
      setTimeout(() => roundFlash.classList.remove("active"), 140);
    }

    function setGestureLabel(gesture) {
      if (
        gesture === GESTURE.ROCK ||
        gesture === GESTURE.PAPER ||
        gesture === GESTURE.SCISSORS ||
        gesture === GESTURE.START ||
        gesture === GESTURE.CONTINUE ||
        gesture === GESTURE.END ||
        gesture === GESTURE.RESTART
      ) {
        gestureLabel.textContent = `掃描：${gestureText[gesture]}`;
        gestureLabel.classList.add("show");
      } else {
        gestureLabel.classList.remove("show");
      }
    }

    function getGestureFromSamples() {
      const count = {};

      for (const gesture of gestureSamples) {
        if (
          gesture === GESTURE.ROCK ||
          gesture === GESTURE.PAPER ||
          gesture === GESTURE.SCISSORS
        ) {
          count[gesture] = (count[gesture] || 0) + 1;
        }
      }

      const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);
      return sorted.length ? sorted[0][0] : GESTURE.UNKNOWN;
    }

    function playRound(playerChoice) {
      const computerChoice = getComputerChoice();

      let resultText = "";
      let resultIcon = "";

      if (playerChoice === computerChoice) {
        draws++;
        resultText = "同步";
        resultIcon = "＝";
      } else if (
        (playerChoice === GESTURE.ROCK && computerChoice === GESTURE.SCISSORS) ||
        (playerChoice === GESTURE.PAPER && computerChoice === GESTURE.ROCK) ||
        (playerChoice === GESTURE.SCISSORS && computerChoice === GESTURE.PAPER)
      ) {
        wins++;
        resultText = "制勝";
        resultIcon = "WIN";
      } else {
        losses++;
        resultText = "失守";
        resultIcon = "LOSE";
      }

      updateScore();
      flash();

      gameState = "RESULT";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;

      gestureLabel.textContent = `你的招式：${gestureText[playerChoice]}`;
      gestureLabel.classList.add("show");

      statusDisplay.innerHTML = `${resultIcon}\n${resultText}`;
      subStatus.innerHTML = `AI 招式：${gestureText[computerChoice]}`;

      setTimeout(showContinueModal, 1300);
    }

    function showContinueModal() {
      gameState = "WAIT_CONTINUE";
      resultModal.style.display = "flex";
      resultTitle.textContent = "回合結算";
      resultHint.textContent = "👌 下一局　🖖 結束";
      bottomHint.textContent = "指令：👌 下一局　🖖 結束";
      updateScore();
    }

    function continueGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");
      gestureSamples = [];
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;
      countdownRunning = false;

      statusDisplay.textContent = "下一局";
      subStatus.textContent = "請鎖定你的招式：✊／🖐️／✌️";
      bottomHint.textContent = "倒數結束時，以最穩定的手勢作為出招";

      setTimeout(() => {
        startCountdown();
      }, 450);
    }

    function endGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      gameState = "ENDED";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;

      statusDisplay.textContent = "競技場關閉";
      subStatus.textContent = `最終紀錄：勝 ${wins}｜敗 ${losses}｜平 ${draws}`;
      bottomHint.textContent = "指令：🤘 重置競技場，直接重新開局";
    }

    function restartGame() {
      wins = 0;
      losses = 0;
      draws = 0;

      updateScore();

      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      gestureSamples = [];
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;
      countdownRunning = false;

      statusDisplay.textContent = "重置完成";
      subStatus.textContent = "請鎖定你的招式：✊／🖐️／✌️";
      bottomHint.textContent = "倒數結束時，以最穩定的手勢作為出招";

      setTimeout(() => {
        startCountdown();
      }, 450);
    }

    function startThinkingText() {
      const texts = [
        "AI 正在讀取節點",
        "系統分析手勢中",
        "競技場同步中",
        "回合資料鎖定中"
      ];

      let index = 0;
      clearInterval(thinkingTimer);

      thinkingTimer = setInterval(() => {
        if (gameState !== "COUNTDOWN") {
          clearInterval(thinkingTimer);
          return;
        }

        subStatus.textContent = texts[index % texts.length];
        index++;
      }, 420);
    }

    async function startCountdown() {
      if (countdownRunning) return;

      countdownRunning = true;
      gameState = "COUNTDOWN";
      gestureSamples = [];

      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      bottomHint.textContent = "保持 ✊ 石頭、🖐️ 布或 ✌️ 剪刀，系統會取樣判定";
      subStatus.textContent = "回合準備";
      startThinkingText();

      const sequence = ["3", "2", "1"];

      for (const number of sequence) {
        statusDisplay.textContent = number;
        await wait(800);
      }

      statusDisplay.textContent = "出招";
      await wait(350);

      const finalGesture = getGestureFromSamples();

      if (finalGesture === GESTURE.UNKNOWN) {
        gameState = "IDLE";
        countdownRunning = false;
        statusDisplay.textContent = "未鎖定";
        subStatus.textContent = "請重新比 ☝️ 開局";
        bottomHint.textContent = "指令：☝️ 開局　👌 下一局　🖖 結束　🤘 重置競技場";
        startHoldFrames = 0;
        return;
      }

      playRound(finalGesture);
    }

    function drawVideoCover(image) {
      const cw = canvasElement.clientWidth;
      const ch = canvasElement.clientHeight;

      if (!image) return;

      const iw = image.videoWidth || image.width || 640;
      const ih = image.videoHeight || image.height || 480;

      if (!iw || !ih) return;

      const imageRatio = iw / ih;
      const canvasRatio = cw / ch;

      if (imageRatio > canvasRatio) {
        drawRect.height = ch;
        drawRect.width = drawRect.height * imageRatio;
        drawRect.x = (cw - drawRect.width) / 2;
        drawRect.y = 0;
      } else {
        drawRect.width = cw;
        drawRect.height = drawRect.width / imageRatio;
        drawRect.x = 0;
        drawRect.y = (ch - drawRect.height) / 2;
      }

      canvasCtx.save();
      canvasCtx.translate(cw, 0);
      canvasCtx.scale(-1, 1);
      canvasCtx.drawImage(image, drawRect.x, drawRect.y, drawRect.width, drawRect.height);
      canvasCtx.restore();
    }

    function mapPoint(point) {
      return {
        x: drawRect.x + (1 - point.x) * drawRect.width,
        y: drawRect.y + point.y * drawRect.height
      };
    }

    function drawPoint(point, radius, color) {
      const p = mapPoint(point);

      canvasCtx.beginPath();
      canvasCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      canvasCtx.fillStyle = color;
      canvasCtx.shadowColor = color;
      canvasCtx.shadowBlur = 10;
      canvasCtx.fill();
      canvasCtx.shadowBlur = 0;
    }

    function drawLine(a, b, color, width) {
      const p1 = mapPoint(a);
      const p2 = mapPoint(b);

      canvasCtx.beginPath();
      canvasCtx.moveTo(p1.x, p1.y);
      canvasCtx.lineTo(p2.x, p2.y);
      canvasCtx.strokeStyle = color;
      canvasCtx.lineWidth = width;
      canvasCtx.lineCap = "round";
      canvasCtx.lineJoin = "round";
      canvasCtx.shadowColor = color;
      canvasCtx.shadowBlur = 12;
      canvasCtx.stroke();
      canvasCtx.shadowBlur = 0;
    }

    function drawHandSkeleton(landmarks) {
      for (const [start, end] of HAND_CONNECTIONS_LOCAL) {
        drawLine(landmarks[start], landmarks[end], "#8eeeff", 4);
      }

      for (let i = 0; i < landmarks.length; i++) {
        if (i === 0) {
          drawPoint(landmarks[i], 8, "#ffbd59");
        } else if ([4, 8, 12, 16, 20].includes(i)) {
          drawPoint(landmarks[i], 5, "#8eeeff");
        } else {
          drawPoint(landmarks[i], 4, "#ffffff");
        }
      }
    }

    function handleGameFlow(gesture) {
      setGestureLabel(gesture);

      if (gameState === "IDLE") {
        if (gesture === GESTURE.START) {
          startHoldFrames += 1;

          if (startHoldFrames > 10) {
            startCountdown();
          }
        } else {
          startHoldFrames = 0;
        }
      }

      if (gameState === "COUNTDOWN") {
        gestureSamples.push(gesture);

        if (gestureSamples.length > 20) {
          gestureSamples.shift();
        }
      }

      if (gameState === "WAIT_CONTINUE") {
        if (gesture === GESTURE.CONTINUE || gesture === GESTURE.END) {
          menuHoldFrames += 1;
        } else {
          menuHoldFrames = 0;
        }

        if (menuHoldFrames > 8) {
          if (gesture === GESTURE.CONTINUE) {
            continueGame();
          }

          if (gesture === GESTURE.END) {
            endGame();
          }

          menuHoldFrames = 0;
        }
      }

      if (gameState === "ENDED") {
        if (gesture === GESTURE.RESTART) {
          restartHoldFrames += 1;
        } else {
          restartHoldFrames = 0;
        }

        if (restartHoldFrames > 8) {
          restartGame();
        }
      }
    }

    function drawOnlyCameraFrame() {
      if (!streamReady) return;

      canvasCtx.clearRect(0, 0, canvasElement.clientWidth, canvasElement.clientHeight);
      drawVideoCover(videoElement);
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.clientWidth, canvasElement.clientHeight);

      drawVideoCover(results.image || videoElement);

      let detectedGesture = GESTURE.UNKNOWN;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        drawHandSkeleton(landmarks);
        detectedGesture = detectGesture(landmarks);
      } else {
        gestureLabel.classList.remove("show");

        if (gameState === "IDLE") {
          startHoldFrames = 0;
          statusDisplay.textContent = "等待開局";
          subStatus.textContent = "比出 ☝️ 後進入倒數";
        }
      }

      updateStableGesture(detectedGesture);
      handleGameFlow(stableGesture);
    }

    async function processFrame() {
      if (!streamReady) {
        requestAnimationFrame(processFrame);
        return;
      }

      if (!hands || processingFrame || videoElement.readyState < 2) {
        drawOnlyCameraFrame();
        requestAnimationFrame(processFrame);
        return;
      }

      try {
        processingFrame = true;
        await hands.send({ image: videoElement });
      } catch (error) {
        console.error(error);
        drawOnlyCameraFrame();
      } finally {
        processingFrame = false;
      }

      requestAnimationFrame(processFrame);
    }

    async function waitForVideoReady(video, timeout = 2500) {
      if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
        return;
      }

      await Promise.race([
        new Promise(resolve => {
          video.onloadedmetadata = resolve;
          video.onloadeddata = resolve;
          video.oncanplay = resolve;
        }),
        new Promise(resolve => setTimeout(resolve, timeout))
      ]);
    }

    async function startCamera() {
      try {
        resizeCanvas();

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("getUserMedia 不支援");
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 720 },
            height: { ideal: 960 }
          },
          audio: false
        });

        videoElement.srcObject = stream;
        videoElement.setAttribute("playsinline", "true");
        videoElement.setAttribute("muted", "true");
        videoElement.setAttribute("autoplay", "true");
        videoElement.muted = true;

        await videoElement.play().catch(() => {});
        await waitForVideoReady(videoElement);

        streamReady = true;

        gameState = "IDLE";
        statusDisplay.textContent = "等待開局";
        subStatus.textContent = "比出 ☝️ 後進入倒數";
        bottomHint.textContent = "指令：☝️ 開局　👌 下一局　🖖 結束　🤘 重置競技場";

        processFrame();

        hands = new Hands({
          locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.72,
          minTrackingConfidence: 0.72
        });

        hands.onResults(onResults);
      } catch (error) {
        console.error(error);
        gameState = "ERROR";
        cameraError.style.display = "flex";
      }
    }

    continueBtn.addEventListener("click", continueGame);
    endBtn.addEventListener("click", endGame);

    updateScore();
    startCamera();
  </script>
</body>
</html>
