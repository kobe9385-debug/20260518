<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI 手勢對戰終端</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #050712;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: white;
      touch-action: none;
      user-select: none;
    }

    #input-video {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 255, 210, 0.22), transparent 32%),
        radial-gradient(circle at 85% 72%, rgba(255, 70, 160, 0.22), transparent 36%),
        linear-gradient(160deg, #050712 0%, #101428 52%, #070914 100%);
    }

    #game-container::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent 85%);
    }

    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #050712;
      z-index: 1;
    }

    #camera-mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      background:
        linear-gradient(180deg, rgba(3, 6, 18, 0.88) 0%, rgba(3, 6, 18, 0.1) 26%, transparent 52%, rgba(3, 6, 18, 0.68) 100%);
    }

    #top-bar {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0) + 14px);
      left: 14px;
      right: 14px;
      height: 76px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid rgba(0, 255, 220, 0.28);
      border-radius: 22px;
      background: rgba(6, 10, 26, 0.72);
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 28px rgba(0, 255, 220, 0.12),
        inset 0 0 24px rgba(255, 255, 255, 0.035);
    }

    #top-title {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #dffcff;
    }

    #top-subtitle {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 800;
      color: rgba(180, 250, 255, 0.6);
      letter-spacing: 1px;
    }

    #corner-score {
      min-width: 76px;
      padding: 9px 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,255,180,0.18), rgba(255,255,255,0.06));
      color: #62ffd3;
      font-size: 17px;
      font-weight: 900;
      text-align: center;
      border: 1px solid rgba(98, 255, 211, 0.32);
    }

    #gesture-label {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0) + 108px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 32;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(7, 10, 24, 0.68);
      backdrop-filter: blur(10px);
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 900;
      color: #f7fbff;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 0 18px rgba(0, 255, 220, 0.12);
    }

    #gesture-label.show {
      opacity: 1;
    }

    #main-ui {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 126px 18px 130px;
      text-align: center;
    }

    #command-panel {
      width: min(92vw, 480px);
      padding: 22px 18px;
      border-radius: 26px;
      background: rgba(5, 8, 22, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      box-shadow:
        0 24px 80px rgba(0,0,0,0.42),
        inset 0 0 22px rgba(255,255,255,0.035);
    }

    #status-display {
      font-size: clamp(32px, 10vw, 72px);
      font-weight: 1000;
      line-height: 1.08;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow:
        0 0 18px rgba(0, 255, 220, 0.32),
        0 6px 26px rgba(0, 0, 0, 0.9);
      white-space: pre-line;
    }

    #sub-status {
      margin-top: 14px;
      min-height: 30px;
      font-size: clamp(14px, 3.8vw, 20px);
      font-weight: 800;
      color: rgba(220, 245, 255, 0.72);
      line-height: 1.5;
    }

    #bottom-hint {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
      z-index: 35;
      min-height: 76px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.6;
      font-size: clamp(13px, 3.6vw, 17px);
      font-weight: 900;
      color: rgba(235, 250, 255, 0.72);
      background: rgba(5, 8, 22, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 24px rgba(255, 70, 160, 0.12);
    }

    #round-flash {
      position: absolute;
      inset: 0;
      z-index: 28;
      background: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: background 0.16s ease;
    }

    #round-flash.active {
      background: rgba(0, 255, 220, 0.18);
    }

    #result-modal {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 4, 12, 0.58);
      backdrop-filter: blur(10px);
    }

    #result-card {
      width: min(92vw, 520px);
      padding: 28px 22px;
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(0,255,220,0.12), transparent 32%),
        rgba(8, 12, 30, 0.88);
      border: 1px solid rgba(0, 255, 220, 0.22);
      box-shadow:
        0 0 54px rgba(0, 0, 0, 0.55),
        0 0 28px rgba(0, 255, 220, 0.12);
      text-align: center;
    }

    #result-title {
      margin: 0 0 14px;
      font-size: clamp(32px, 8.5vw, 54px);
      font-weight: 1000;
      letter-spacing: 2px;
      color: #ffffff;
    }

    #result-score {
      width: 100%;
      margin: 0 auto 20px;
      padding: 14px;
      border-radius: 18px;
      font-size: clamp(17px, 4.5vw, 24px);
      font-weight: 900;
      color: rgba(235, 250, 255, 0.9);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.09);
    }

    #result-hint {
      margin-bottom: 18px;
      font-size: clamp(15px, 4vw, 20px);
      color: rgba(220, 245, 255, 0.68);
      font-weight: 900;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .game-btn {
      height: 70px;
      border: none;
      border-radius: 20px;
      color: white;
      font-size: clamp(18px, 5vw, 28px);
      font-weight: 1000;
      cursor: pointer;
    }

    #end-btn {
      background: linear-gradient(135deg, #ff3f7d, #822fff);
      box-shadow: 0 0 24px rgba(255, 63, 125, 0.22);
    }

    #continue-btn {
      color: #03110e;
      background: linear-gradient(135deg, #60ffd5, #c4fff0);
      box-shadow: 0 0 24px rgba(0, 255, 220, 0.25);
    }

    #camera-error {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, #191653, #050510 72%);
      text-align: center;
    }

    #camera-error-card {
      max-width: 520px;
      width: 100%;
      padding: 30px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    #camera-error-card h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    #camera-error-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.7;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      #game-container {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <video id="input-video" playsinline muted autoplay></video>

  <main id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="camera-mask"></div>
    <div id="round-flash"></div>

    <header id="top-bar">
      <div>
        <div id="top-title">GESTURE DUEL TERMINAL</div>
        <div id="top-subtitle">AI RPS SYSTEM / LIVE HAND TRACKING</div>
      </div>
      <div id="corner-score">WIN 0</div>
    </header>

    <div id="gesture-label">SCAN：☝️ START</div>

    <section id="main-ui">
      <div id="command-panel">
        <div id="status-display">CAMERA<br>BOOTING</div>
        <div id="sub-status">等待攝影機權限與影像串流</div>
      </div>
    </section>

    <div id="bottom-hint">
      ☝️ 啟動對戰　👌 下一回合　🖖 結束任務　🤘 重啟終端
    </div>

    <section id="result-modal">
      <div id="result-card">
        <h1 id="result-title">ROUND COMPLETE</h1>
        <div id="result-score">WIN 0　LOSE 0　DRAW 0</div>
        <div id="result-hint">👌 下一回合　🖖 結束任務</div>

        <div class="button-row">
          <button id="end-btn" class="game-btn">🖖 END</button>
          <button id="continue-btn" class="game-btn">👌 NEXT</button>
        </div>
      </div>
    </section>

    <section id="camera-error">
      <div id="camera-error-card">
        <h1>攝影機啟動失敗</h1>
        <p>
          請確認瀏覽器已允許攝影機權限。<br />
          若使用 GitHub Pages，網址必須是 HTTPS。<br />
          請重新整理頁面再試一次。
        </p>
      </div>
    </section>
  </main>

  <script>
    const videoElement = document.getElementById("input-video");
    const canvasElement = document.getElementById("game-canvas");
    const canvasCtx = canvasElement.getContext("2d");

    const statusDisplay = document.getElementById("status-display");
    const subStatus = document.getElementById("sub-status");
    const bottomHint = document.getElementById("bottom-hint");
    const cornerScore = document.getElementById("corner-score");
    const gestureLabel = document.getElementById("gesture-label");

    const resultModal = document.getElementById("result-modal");
    const resultTitle = document.getElementById("result-title");
    const resultScore = document.getElementById("result-score");
    const resultHint = document.getElementById("result-hint");

    const endBtn = document.getElementById("end-btn");
    const continueBtn = document.getElementById("continue-btn");
    const roundFlash = document.getElementById("round-flash");
    const cameraError = document.getElementById("camera-error");

    const HAND_CONNECTIONS_LOCAL = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17]
    ];

    const GESTURE = {
      ROCK: "ROCK",
      PAPER: "PAPER",
      SCISSORS: "SCISSORS",
      START: "START",
      CONTINUE: "CONTINUE",
      END: "END",
      RESTART: "RESTART",
      UNKNOWN: "UNKNOWN"
    };

    const gestureText = {
      ROCK: "✊ ROCK",
      PAPER: "🖐️ PAPER",
      SCISSORS: "✌️ SCISSORS",
      START: "☝️ START",
      CONTINUE: "👌 NEXT",
      END: "🖖 END",
      RESTART: "🤘 REBOOT",
      UNKNOWN: ""
    };

    let gameState = "LOADING";
    let wins = 0;
    let losses = 0;
    let draws = 0;

    let latestGesture = GESTURE.UNKNOWN;
    let stableGesture = GESTURE.UNKNOWN;
    let stableCount = 0;
    let startHoldFrames = 0;
    let menuHoldFrames = 0;
    let restartHoldFrames = 0;

    let countdownRunning = false;
    let gestureSamples = [];
    let thinkingTimer = null;
    let processingFrame = false;
    let hands = null;
    let streamReady = false;

    let drawRect = {
      x: 0,
      y: 0,
      width: 0,
      height: 0
    };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = canvasElement.clientWidth;
      const height = canvasElement.clientHeight;

      canvasElement.width = Math.floor(width * dpr);
      canvasElement.height = Math.floor(height * dpr);

      canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function fingerIsExtended(landmarks, tip, pip, mcp) {
      const tipToWrist = distance(landmarks[tip], landmarks[0]);
      const pipToWrist = distance(landmarks[pip], landmarks[0]);
      const mcpToWrist = distance(landmarks[mcp], landmarks[0]);

      const verticalExtended = landmarks[tip].y < landmarks[pip].y;

      const distanceExtended =
        tipToWrist > pipToWrist &&
        pipToWrist > mcpToWrist * 0.82;

      return verticalExtended || distanceExtended;
    }

    function isOkGesture(landmarks) {
      const thumbIndexClose = distance(landmarks[4], landmarks[8]) < 0.075;

      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      return thumbIndexClose && middleUp && ringUp && pinkyUp;
    }

    function isVulcanGesture(landmarks) {
      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (!(indexUp && middleUp && ringUp && pinkyUp)) return false;

      const indexMiddleGap = distance(landmarks[8], landmarks[12]);
      const middleRingGap = distance(landmarks[12], landmarks[16]);
      const ringPinkyGap = distance(landmarks[16], landmarks[20]);

      return (
        middleRingGap > indexMiddleGap * 1.1 &&
        middleRingGap > ringPinkyGap * 1.1 &&
        middleRingGap > 0.05
      );
    }

    function isRockOnGesture(landmarks) {
      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      return indexUp && !middleUp && !ringUp && pinkyUp;
    }

    function detectGesture(landmarks) {
      if (!landmarks || landmarks.length < 21) return GESTURE.UNKNOWN;

      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (isOkGesture(landmarks)) return GESTURE.CONTINUE;
      if (isVulcanGesture(landmarks)) return GESTURE.END;
      if (isRockOnGesture(landmarks)) return GESTURE.RESTART;

      if (indexUp && !middleUp && !ringUp && !pinkyUp) {
        return GESTURE.START;
      }

      const extendedCount = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

      if (extendedCount >= 4) return GESTURE.PAPER;
      if (indexUp && middleUp && !ringUp && !pinkyUp) return GESTURE.SCISSORS;
      if (extendedCount === 0) return GESTURE.ROCK;

      return GESTURE.UNKNOWN;
    }

    function updateStableGesture(gesture) {
      if (gesture === latestGesture) {
        stableCount += 1;
      } else {
        latestGesture = gesture;
        stableCount = 1;
      }

      if (stableCount >= 3) {
        stableGesture = gesture;
      }
    }

    function getComputerChoice() {
      const choices = [GESTURE.ROCK, GESTURE.PAPER, GESTURE.SCISSORS];
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function updateScore() {
      cornerScore.textContent = `WIN ${wins}`;
      resultScore.textContent = `WIN ${wins}　LOSE ${losses}　DRAW ${draws}`;
    }

    function flash() {
      roundFlash.classList.add("active");
      setTimeout(() => roundFlash.classList.remove("active"), 140);
    }

    function setGestureLabel(gesture) {
      if (
        gesture === GESTURE.ROCK ||
        gesture === GESTURE.PAPER ||
        gesture === GESTURE.SCISSORS ||
        gesture === GESTURE.START ||
        gesture === GESTURE.CONTINUE ||
        gesture === GESTURE.END ||
        gesture === GESTURE.RESTART
      ) {
        gestureLabel.textContent = `SCAN：${gestureText[gesture]}`;
        gestureLabel.classList.add("show");
      } else {
        gestureLabel.classList.remove("show");
      }
    }

    function getGestureFromSamples() {
      const count = {};

      for (const gesture of gestureSamples) {
        if (
          gesture === GESTURE.ROCK ||
          gesture === GESTURE.PAPER ||
          gesture === GESTURE.SCISSORS
        ) {
          count[gesture] = (count[gesture] || 0) + 1;
        }
      }

      const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);
      return sorted.length ? sorted[0][0] : GESTURE.UNKNOWN;
    }

    function playRound(playerChoice) {
      const computerChoice = getComputerChoice();

      let resultText = "";
      let resultIcon = "";

      if (playerChoice === computerChoice) {
        draws++;
        resultText = "DRAW";
        resultIcon = "🤝";
      } else if (
        (playerChoice === GESTURE.ROCK && computerChoice === GESTURE.SCISSORS) ||
        (playerChoice === GESTURE.PAPER && computerChoice === GESTURE.ROCK) ||
        (playerChoice === GESTURE.SCISSORS && computerChoice === GESTURE.PAPER)
      ) {
        wins++;
        resultText = "PLAYER WIN";
        resultIcon = "✅";
      } else {
        losses++;
        resultText = "AI WIN";
        resultIcon = "❌";
      }

      updateScore();
      flash();

      gameState = "RESULT";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;

      gestureLabel.textContent = `PLAYER：${gestureText[playerChoice]}`;
      gestureLabel.classList.add("show");

      statusDisplay.innerHTML = `${resultIcon}<br>${resultText}`;
      subStatus.innerHTML = `AI OUTPUT：${gestureText[computerChoice]}`;

      setTimeout(showContinueModal, 1300);
    }

    function showContinueModal() {
      gameState = "WAIT_CONTINUE";
      resultModal.style.display = "flex";
      resultTitle.textContent = "ROUND COMPLETE";
      resultHint.textContent = "👌 下一回合　🖖 結束任務";
      bottomHint.textContent = "👌 下一回合　🖖 結束任務";
      updateScore();
    }

    function continueGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      gestureSamples = [];
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;
      countdownRunning = false;

      statusDisplay.textContent = "NEXT ROUND";
      subStatus.textContent = "請固定 ✊ ROCK、🖐️ PAPER 或 ✌️ SCISSORS";
      bottomHint.textContent = "倒數結束時鎖定手勢";

      setTimeout(() => {
        startCountdown();
      }, 450);
    }

    function endGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      gameState = "ENDED";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;

      statusDisplay.textContent = "MISSION END";
      subStatus.textContent = `FINAL：WIN ${wins} / LOSE ${losses} / DRAW ${draws}`;
      bottomHint.textContent = "🤘 重啟終端";
    }

    function restartGame() {
      wins = 0;
      losses = 0;
      draws = 0;

      updateScore();

      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      gestureSamples = [];
      startHoldFrames = 0;
      menuHoldFrames = 0;
      restartHoldFrames = 0;
      countdownRunning = false;

      statusDisplay.textContent = "REBOOT";
      subStatus.textContent = "請固定 ✊ ROCK、🖐️ PAPER 或 ✌️ SCISSORS";
      bottomHint.textContent = "倒數結束時鎖定手勢";

      setTimeout(() => {
        startCountdown();
      }, 450);
    }

    function startThinkingText() {
      const texts = [
        "AI 正在比對手勢資料",
        "終端正在鎖定輸入",
        "對戰模型計算中",
        "手勢樣本收集中"
      ];

      let index = 0;
      clearInterval(thinkingTimer);

      thinkingTimer = setInterval(() => {
        if (gameState !== "COUNTDOWN") {
          clearInterval(thinkingTimer);
          return;
        }

        subStatus.textContent = texts[index % texts.length];
        index++;
      }, 420);
    }

    async function startCountdown() {
      if (countdownRunning) return;

      countdownRunning = true;
      gameState = "COUNTDOWN";
      gestureSamples = [];

      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      bottomHint.textContent = "倒數結束時鎖定 ✊ / 🖐️ / ✌️";
      subStatus.textContent = "手勢輸入準備中";
      startThinkingText();

      const sequence = ["03", "02", "01"];

      for (const number of sequence) {
        statusDisplay.textContent = number;
        await wait(800);
      }

      statusDisplay.textContent = "LOCK";
      await wait(350);
