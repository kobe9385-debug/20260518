<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI 即時手勢辨識猜拳</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #050510;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: white;
      touch-action: none;
      user-select: none;
    }

    #input-video {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 80% 20%, rgba(85, 40, 190, 0.45), transparent 40%),
        linear-gradient(180deg, #151345 0%, #070710 50%, #12123a 100%);
    }

    #game-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #050510;
      z-index: 1;
    }

    #camera-mask {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          180deg,
          rgba(7, 7, 20, 0.78) 0%,
          rgba(7, 7, 20, 0.18) 18%,
          transparent 36%,
          transparent 70%,
          rgba(7, 7, 20, 0.56) 100%
        );
      z-index: 4;
    }

    #top-bar {
      position: absolute;
      top: env(safe-area-inset-top, 0);
      left: 0;
      width: 100%;
      height: 88px;
      z-index: 20;
      background: linear-gradient(180deg, rgba(24, 22, 74, 0.96), rgba(16, 15, 48, 0.82));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
    }

    #top-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    #corner-score {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0) + 106px);
      right: 14px;
      z-index: 30;
      min-width: 78px;
      padding: 10px 14px;
      border-radius: 14px 0 0 14px;
      background: rgba(0, 0, 0, 0.88);
      color: #00ff88;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 0 18px rgba(0, 255, 120, 0.28);
      text-align: center;
    }

    #main-ui {
      position: absolute;
      inset: 0;
      z-index: 25;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      padding: 100px 16px 130px;
      text-align: center;
    }

    #gesture-label {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0) + 155px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 32;
      font-size: clamp(24px, 7vw, 42px);
      font-weight: 900;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.9);
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    #gesture-label.show {
      opacity: 1;
    }

    #status-display {
      font-size: clamp(34px, 11vw, 86px);
      font-weight: 900;
      line-height: 1.15;
      text-shadow:
        0 5px 24px rgba(0, 0, 0, 0.9),
        0 0 20px rgba(255, 255, 255, 0.32);
      letter-spacing: 2px;
      white-space: pre-line;
    }

    #sub-status {
      margin-top: 18px;
      min-height: 30px;
      font-size: clamp(15px, 4vw, 22px);
      font-weight: 800;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.9);
    }

    #bottom-hint {
      position: absolute;
      left: 0;
      bottom: env(safe-area-inset-bottom, 0);
      z-index: 35;
      width: 100%;
      min-height: 96px;
      padding: 18px 16px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.65;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 800;
      color: rgba(255, 255, 255, 0.58);
      background: linear-gradient(180deg, rgba(18, 17, 55, 0.62), rgba(23, 26, 72, 0.94));
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }

    #round-flash {
      position: absolute;
      inset: 0;
      z-index: 28;
      background: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: background 0.16s ease;
    }

    #round-flash.active {
      background: rgba(255, 255, 255, 0.22);
    }

    #result-modal {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(7px);
    }

    #result-card {
      width: min(92vw, 520px);
      padding: 32px 24px 28px;
      border-radius: 28px;
      background: rgba(15, 15, 18, 0.72);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.55),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    #result-title {
      margin: 0 0 14px;
      font-size: clamp(38px, 10vw, 64px);
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
    }

    #result-score {
      width: 100%;
      margin: 0 auto 26px;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: clamp(18px, 4.8vw, 26px);
      font-weight: 900;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.08);
    }

    #result-hint {
      margin-bottom: 18px;
      font-size: clamp(15px, 4vw, 21px);
      color: rgba(255, 255, 255, 0.72);
      font-weight: 900;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .game-btn {
      height: 78px;
      border: none;
      border-radius: 999px;
      color: white;
      font-size: clamp(20px, 5.5vw, 32px);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 26px rgba(0, 0, 0, 0.35);
    }

    #end-btn {
      background: linear-gradient(180deg, #ff2a15, #db1303);
    }

    #continue-btn {
      color: #00d66e;
      background: #fff;
      box-shadow: 0 0 26px rgba(0, 255, 120, 0.32);
    }

    #camera-error {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, #191653, #050510 72%);
      text-align: center;
    }

    #camera-error-card {
      max-width: 520px;
      width: 100%;
      padding: 30px 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    #camera-error-card h1 {
      margin: 0 0 12px;
      font-size: 30px;
    }

    #camera-error-card p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.7;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      #game-container {
        max-width: 520px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <video id="input-video" playsinline muted autoplay></video>

  <main id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="camera-mask"></div>
    <div id="round-flash"></div>

    <header id="top-bar">
      <div id="top-title">AI 即時手勢辨識猜拳</div>
    </header>

    <div id="corner-score">✅ 0勝</div>

    <div id="gesture-label">辨識：☝️ 開始</div>

    <section id="main-ui">
      <div id="status-display">啟動攝影機中...</div>
      <div id="sub-status">☝️ 開始　✊ 石頭　🖐️ 布　✌️ 剪刀</div>
    </section>

    <div id="bottom-hint">
      ☝️ 開始　👌 繼續　🖖 結束
    </div>

    <section id="result-modal">
      <div id="result-card">
        <h1 id="result-title">再玩一局？</h1>
        <div id="result-score">✅ 0勝　❌ 0敗　🤝 0平</div>
        <div id="result-hint">👌 繼續　🖖 結束</div>

        <div class="button-row">
          <button id="end-btn" class="game-btn">🖖 結束</button>
          <button id="continue-btn" class="game-btn">👌 繼續</button>
        </div>
      </div>
    </section>

    <section id="camera-error">
      <div id="camera-error-card">
        <h1>攝影機啟動失敗</h1>
        <p>
          請確認瀏覽器已允許攝影機權限。<br />
          若使用 GitHub Pages，網址必須是 HTTPS。
        </p>
      </div>
    </section>
  </main>

  <script>
    const videoElement = document.getElementById("input-video");
    const canvasElement = document.getElementById("game-canvas");
    const canvasCtx = canvasElement.getContext("2d");

    const statusDisplay = document.getElementById("status-display");
    const subStatus = document.getElementById("sub-status");
    const bottomHint = document.getElementById("bottom-hint");
    const cornerScore = document.getElementById("corner-score");
    const gestureLabel = document.getElementById("gesture-label");

    const resultModal = document.getElementById("result-modal");
    const resultTitle = document.getElementById("result-title");
    const resultScore = document.getElementById("result-score");
    const resultHint = document.getElementById("result-hint");

    const endBtn = document.getElementById("end-btn");
    const continueBtn = document.getElementById("continue-btn");
    const roundFlash = document.getElementById("round-flash");
    const cameraError = document.getElementById("camera-error");

    const HAND_CONNECTIONS_LOCAL = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17]
    ];

    const GESTURE = {
      ROCK: "ROCK",
      PAPER: "PAPER",
      SCISSORS: "SCISSORS",
      START: "START",
      CONTINUE: "CONTINUE",
      END: "END",
      UNKNOWN: "UNKNOWN"
    };

    const gestureText = {
      ROCK: "✊ 石頭",
      PAPER: "🖐️ 布",
      SCISSORS: "✌️ 剪刀",
      START: "☝️ 開始",
      CONTINUE: "👌 繼續",
      END: "🖖 結束",
      UNKNOWN: ""
    };

    let gameState = "LOADING";
    let wins = 0;
    let losses = 0;
    let draws = 0;

    let latestGesture = GESTURE.UNKNOWN;
    let stableGesture = GESTURE.UNKNOWN;
    let stableCount = 0;
    let startHoldFrames = 0;
    let menuHoldFrames = 0;

    let countdownRunning = false;
    let gestureSamples = [];
    let thinkingTimer = null;
    let processingFrame = false;
    let hands = null;

    let drawRect = {
      x: 0,
      y: 0,
      width: 0,
      height: 0
    };

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = canvasElement.clientWidth;
      const height = canvasElement.clientHeight;

      canvasElement.width = Math.floor(width * dpr);
      canvasElement.height = Math.floor(height * dpr);

      canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function fingerIsExtended(landmarks, tip, pip, mcp) {
      const tipToWrist = distance(landmarks[tip], landmarks[0]);
      const pipToWrist = distance(landmarks[pip], landmarks[0]);
      const mcpToWrist = distance(landmarks[mcp], landmarks[0]);

      const verticalExtended = landmarks[tip].y < landmarks[pip].y;
      const distanceExtended = tipToWrist > pipToWrist && pipToWrist > mcpToWrist * 0.82;

      return verticalExtended || distanceExtended;
    }

    function isOkGesture(landmarks) {
      const thumbIndexClose = distance(landmarks[4], landmarks[8]) < 0.075;
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      return thumbIndexClose && middleUp && ringUp && pinkyUp;
    }

    function isVulcanGesture(landmarks) {
      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (!(indexUp && middleUp && ringUp && pinkyUp)) return false;

      const indexMiddleGap = distance(landmarks[8], landmarks[12]);
      const middleRingGap = distance(landmarks[12], landmarks[16]);
      const ringPinkyGap = distance(landmarks[16], landmarks[20]);

      return (
        middleRingGap > indexMiddleGap * 1.15 &&
        middleRingGap > ringPinkyGap * 1.15 &&
        middleRingGap > 0.055
      );
    }

    function detectGesture(landmarks) {
      if (!landmarks || landmarks.length < 21) return GESTURE.UNKNOWN;

      const indexUp = fingerIsExtended(landmarks, 8, 6, 5);
      const middleUp = fingerIsExtended(landmarks, 12, 10, 9);
      const ringUp = fingerIsExtended(landmarks, 16, 14, 13);
      const pinkyUp = fingerIsExtended(landmarks, 20, 18, 17);

      if (isOkGesture(landmarks)) {
        return GESTURE.CONTINUE;
      }

      if (isVulcanGesture(landmarks)) {
        return GESTURE.END;
      }

      if (indexUp && !middleUp && !ringUp && !pinkyUp) {
        return GESTURE.START;
      }

      const extendedCount = [indexUp, middleUp, ringUp, pinkyUp].filter(Boolean).length;

      if (extendedCount >= 4) return GESTURE.PAPER;
      if (indexUp && middleUp && !ringUp && !pinkyUp) return GESTURE.SCISSORS;
      if (extendedCount === 0) return GESTURE.ROCK;

      return GESTURE.UNKNOWN;
    }

    function updateStableGesture(gesture) {
      if (gesture === latestGesture) {
        stableCount += 1;
      } else {
        latestGesture = gesture;
        stableCount = 1;
      }

      if (stableCount >= 3) {
        stableGesture = gesture;
      }
    }

    function getComputerChoice() {
      const choices = [GESTURE.ROCK, GESTURE.PAPER, GESTURE.SCISSORS];
      return choices[Math.floor(Math.random() * choices.length)];
    }

    function updateScore() {
      cornerScore.textContent = `✅ ${wins}勝`;
      resultScore.textContent = `✅ ${wins}勝　❌ ${losses}敗　🤝 ${draws}平`;
    }

    function flash() {
      roundFlash.classList.add("active");
      setTimeout(() => roundFlash.classList.remove("active"), 140);
    }

    function setGestureLabel(gesture) {
      if (
        gesture === GESTURE.ROCK ||
        gesture === GESTURE.PAPER ||
        gesture === GESTURE.SCISSORS ||
        gesture === GESTURE.START ||
        gesture === GESTURE.CONTINUE ||
        gesture === GESTURE.END
      ) {
        gestureLabel.textContent = `辨識：${gestureText[gesture]}`;
        gestureLabel.classList.add("show");
      } else {
        gestureLabel.classList.remove("show");
      }
    }

    function getGestureFromSamples() {
      const count = {};

      for (const gesture of gestureSamples) {
        if (
          gesture === GESTURE.ROCK ||
          gesture === GESTURE.PAPER ||
          gesture === GESTURE.SCISSORS
        ) {
          count[gesture] = (count[gesture] || 0) + 1;
        }
      }

      const sorted = Object.entries(count).sort((a, b) => b[1] - a[1]);
      return sorted.length ? sorted[0][0] : GESTURE.UNKNOWN;
    }

    function playRound(playerChoice) {
      const computerChoice = getComputerChoice();

      let resultText = "";
      let resultIcon = "";

      if (playerChoice === computerChoice) {
        draws++;
        resultText = "平手";
        resultIcon = "🤝";
      } else if (
        (playerChoice === GESTURE.ROCK && computerChoice === GESTURE.SCISSORS) ||
        (playerChoice === GESTURE.PAPER && computerChoice === GESTURE.ROCK) ||
        (playerChoice === GESTURE.SCISSORS && computerChoice === GESTURE.PAPER)
      ) {
        wins++;
        resultText = "你贏了";
        resultIcon = "✅";
      } else {
        losses++;
        resultText = "你輸了";
        resultIcon = "❌";
      }

      updateScore();
      flash();

      gameState = "RESULT";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;

      gestureLabel.textContent = `你出：${gestureText[playerChoice]}`;
      gestureLabel.classList.add("show");

      statusDisplay.innerHTML = `${resultIcon} ${resultText}`;
      subStatus.innerHTML = `電腦出：${gestureText[computerChoice]}`;

      setTimeout(showContinueModal, 1300);
    }

    function showContinueModal() {
      gameState = "WAIT_CONTINUE";
      resultModal.style.display = "flex";
      resultTitle.textContent = "再玩一局？";
      resultHint.textContent = "👌 繼續　🖖 結束";
      bottomHint.textContent = "👌 繼續　🖖 結束";
      updateScore();
    }

    function continueGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");
      gestureSamples = [];
      startHoldFrames = 0;
      menuHoldFrames = 0;
      countdownRunning = false;

      statusDisplay.textContent = "準備下一局";
      subStatus.textContent = "請固定 ✊ 石頭、🖐️ 布或 ✌️ 剪刀";
      bottomHint.textContent = "倒數結束時請固定手勢";

      setTimeout(() => {
        startCountdown();
      }, 450);
    }

    function endGame() {
      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");
      gameState = "ENDED";
      countdownRunning = false;
      startHoldFrames = 0;
      menuHoldFrames = 0;
      statusDisplay.textContent = "遊戲結束";
      subStatus.textContent = `最終成績：✅ ${wins}勝　❌ ${losses}敗　🤝 ${draws}平`;
      bottomHint.textContent = "重新整理頁面即可重新開始";
    }

    function startThinkingText() {
      const texts = [
        "電腦正在思考",
        "AI 正在觀察",
        "系統正在判斷",
        "正在讀取手勢"
      ];

      let index = 0;
      clearInterval(thinkingTimer);

      thinkingTimer = setInterval(() => {
        if (gameState !== "COUNTDOWN") {
          clearInterval(thinkingTimer);
          return;
        }

        subStatus.textContent = texts[index % texts.length];
        index++;
      }, 420);
    }

    async function startCountdown() {
      if (countdownRunning) return;

      countdownRunning = true;
      gameState = "COUNTDOWN";
      gestureSamples = [];

      resultModal.style.display = "none";
      gestureLabel.classList.remove("show");

      bottomHint.textContent = "倒數結束時請固定 ✊ 石頭、🖐️ 布或 ✌️ 剪刀";
      subStatus.textContent = "準備出拳";
      startThinkingText();

      const sequence = ["3", "2", "1"];

      for (const number of sequence) {
        statusDisplay.textContent = number;
        await wait(800);
      }

      statusDisplay.textContent = "出拳";
      await wait(350);

      const finalGesture = getGestureFromSamples();

      if (finalGesture === GESTURE.UNKNOWN) {
        gameState = "IDLE";
        countdownRunning = false;
        statusDisplay.textContent = "沒有辨識到";
        subStatus.textContent = "請重新比 ☝️ 開始";
        bottomHint.textContent = "☝️ 開始　✊ 石頭　🖐️ 布　✌️ 剪刀";
        startHoldFrames = 0;
        return;
      }

      playRound(finalGesture);
    }

    function drawVideoCover(image) {
      const cw = canvasElement.clientWidth;
      const ch = canvasElement.clientHeight;

      if (!image) return;

      const iw = image.videoWidth || image.width || 640;
      const ih = image.videoHeight || image.height || 480;

      if (!iw || !ih) return;

      const imageRatio = iw / ih;
      const canvasRatio = cw / ch;

      if (imageRatio > canvasRatio) {
        drawRect.height = ch;
        drawRect.width = drawRect.height * imageRatio;
        drawRect.x = (cw - drawRect.width) / 2;
        drawRect.y = 0;
      } else {
        drawRect.width = cw;
        drawRect.height = drawRect.width / imageRatio;
        drawRect.x = 0;
        drawRect.y = (ch - drawRect.height) / 2;
      }

      canvasCtx.save();
      canvasCtx.translate(cw, 0);
      canvasCtx.scale(-1, 1);
      canvasCtx.drawImage(image, drawRect.x, drawRect.y, drawRect.width, drawRect.height);
      canvasCtx.restore();
    }

    function mapPoint(point) {
      return {
        x: drawRect.x + (1 - point.x) * drawRect.width,
        y: drawRect.y + point.y * drawRect.height
      };
    }

    function drawPoint(point, radius, color) {
      const p = mapPoint(point);

      canvasCtx.beginPath();
      canvasCtx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      canvasCtx.fillStyle = color;
      canvasCtx.shadowColor = color;
      canvasCtx.shadowBlur = 10;
      canvasCtx.fill();
      canvasCtx.shadowBlur = 0;
    }

    function drawLine(a, b, color, width) {
      const p1 = mapPoint(a);
      const p2 = mapPoint(b);

      canvasCtx.beginPath();
      canvasCtx.moveTo(p1.x, p1.y);
      canvasCtx.lineTo(p2.x, p2.y);
      canvasCtx.strokeStyle = color;
      canvasCtx.lineWidth = width;
      canvasCtx.lineCap = "round";
      canvasCtx.lineJoin = "round";
      canvasCtx.shadowColor = color;
      canvasCtx.shadowBlur = 12;
      canvasCtx.stroke();
      canvasCtx.shadowBlur = 0;
    }

    function drawHandSkeleton(landmarks) {
      for (const [start, end] of HAND_CONNECTIONS_LOCAL) {
        drawLine(landmarks[start], landmarks[end], "#00ff88", 4);
      }

      for (let i = 0; i < landmarks.length; i++) {
        if (i === 0) {
          drawPoint(landmarks[i], 8, "#d9265b");
        } else if ([4, 8, 12, 16, 20].includes(i)) {
          drawPoint(landmarks[i], 5, "#00ff88");
        } else {
          drawPoint(landmarks[i], 4, "#ffffff");
        }
      }
    }

    function handleGameFlow(gesture) {
      setGestureLabel(gesture);

      if (gameState === "IDLE") {
        if (gesture === GESTURE.START) {
          startHoldFrames += 1;

          if (startHoldFrames > 10) {
            startCountdown();
          }
        } else {
          startHoldFrames = 0;
        }
      }

      if (gameState === "COUNTDOWN") {
        gestureSamples.push(gesture);

        if (gestureSamples.length > 20) {
          gestureSamples.shift();
        }
      }

      if (gameState === "WAIT_CONTINUE") {
        if (gesture === GESTURE.CONTINUE || gesture === GESTURE.END) {
          menuHoldFrames += 1;
        } else {
          menuHoldFrames = 0;
        }

        if (menuHoldFrames > 8) {
          if (gesture === GESTURE.CONTINUE) {
            continueGame();
          }

          if (gesture === GESTURE.END) {
            endGame();
          }

          menuHoldFrames = 0;
        }
      }
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.clientWidth, canvasElement.clientHeight);

      drawVideoCover(results.image);

      let detectedGesture = GESTURE.UNKNOWN;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];

        drawHandSkeleton(landmarks);
        detectedGesture = detectGesture(landmarks);
      } else {
        gestureLabel.classList.remove("show");

        if (gameState === "IDLE") {
          startHoldFrames = 0;
          statusDisplay.textContent = "☝️ 請比開始手勢";
          subStatus.textContent = "☝️ 開始　✊ 石頭　🖐️ 布　✌️ 剪刀";
        }
      }

      updateStableGesture(detectedGesture);
      handleGameFlow(stableGesture);
    }

    async function processFrame() {
      if (!hands || processingFrame) {
        requestAnimationFrame(processFrame);
        return;
      }

      if (videoElement.readyState >= 2) {
        try {
          processingFrame = true;
          await hands.send({ image: videoElement });
        } catch (error) {
          console.error(error);
        } finally {
          processingFrame = false;
        }
      }

      requestAnimationFrame(processFrame);
    }

    async function startCamera() {
      try {
        resizeCanvas();

        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 720 },
            height: { ideal: 960 }
          },
          audio: false
        });

        videoElement.srcObject = stream;
        videoElement.setAttribute("playsinline", "true");
        videoElement.setAttribute("muted", "true");
        videoElement.setAttribute("autoplay", "true");
        videoElement.muted = true;

        await new Promise(resolve => {
          videoElement.onloadedmetadata = resolve;
        });

        await videoElement.play();

        hands = new Hands({
          locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.72,
          minTrackingConfidence: 0.72
        });

        hands.onResults(onResults);

        gameState = "IDLE";
        statusDisplay.textContent = "☝️ 請比開始手勢";
        subStatus.textContent = "☝️ 開始　✊ 石頭　🖐️ 布　✌️ 剪刀";
        bottomHint.textContent = "☝️ 開始　👌 繼續　🖖 結束";

        processFrame();
      } catch (error) {
        console.error(error);
        gameState = "ERROR";
        cameraError.style.display = "flex";
      }
    }

    continueBtn.addEventListener("click", continueGame);
    endBtn.addEventListener("click", endGame);

    updateScore();
    startCamera();
  </script>
</body>
</html>
